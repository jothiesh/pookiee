<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ✦ A Pocket Universe of Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#ff5d8f; --plum:#7c3aed; --peach:#ffb37b; --berry:#f43f6e;
  --ink:#3a2233; --muted:#9a7b8c; --glass:rgba(255,255,255,.62);
  --line:rgba(124,58,237,.14); --accent:var(--rose);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Outfit',system-ui,sans-serif; color:var(--ink);
  background:#fff4f8; min-height:100%; overflow-x:hidden; position:relative;
}
/* drifting aurora mesh */
.mesh{position:fixed;inset:-20% -20% -20% -20%;z-index:0;filter:blur(60px);opacity:.9;}
.mesh i{position:absolute;border-radius:50%;mix-blend-mode:multiply;animation:drift 22s ease-in-out infinite;}
.mesh i:nth-child(1){width:48vmax;height:48vmax;left:-6%;top:-10%;background:radial-gradient(circle,#ffb3cd,transparent 60%);}
.mesh i:nth-child(2){width:42vmax;height:42vmax;right:-8%;top:6%;background:radial-gradient(circle,#d9c4ff,transparent 60%);animation-delay:-6s;}
.mesh i:nth-child(3){width:46vmax;height:46vmax;left:18%;bottom:-16%;background:radial-gradient(circle,#ffd9b0,transparent 60%);animation-delay:-12s;}
.mesh i:nth-child(4){width:36vmax;height:36vmax;right:14%;bottom:-10%;background:radial-gradient(circle,#ffc1d9,transparent 60%);animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(4%,-3%) scale(1.08);}66%{transform:translate(-3%,4%) scale(.96);}}
.glow{position:fixed;width:340px;height:340px;border-radius:50%;pointer-events:none;z-index:1;
  background:radial-gradient(circle,rgba(255,93,143,.18),transparent 70%);transform:translate(-50%,-50%);transition:opacity .4s;opacity:0;}

/* TOP BAR */
.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;
  padding:12px clamp(14px,4vw,34px);backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(255,244,248,.86),rgba(255,244,248,.45));
  border-bottom:1px solid var(--line);}
.brand{font-family:'Fraunces',serif;font-weight:700;font-size:20px;letter-spacing:.3px;
  background:linear-gradient(90deg,var(--rose),var(--plum));-webkit-background-clip:text;background-clip:text;color:transparent;}
.bar .sp{flex:1;}
.pts{display:flex;align-items:center;gap:9px;padding:7px 14px;border-radius:99px;cursor:pointer;
  background:var(--glass);border:1px solid var(--line);box-shadow:0 6px 18px rgba(124,58,237,.12);transition:transform .2s;}
.pts:hover{transform:translateY(-1px);}
.orb{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,var(--rose));
  box-shadow:0 0 0 4px rgba(255,93,143,.18);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{50%{box-shadow:0 0 0 9px rgba(255,93,143,0);}}
.pts b{font-variant-numeric:tabular-nums;font-weight:700;}
.pts small{color:var(--muted);font-size:11px;}
.iconbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--glass);
  cursor:pointer;font-size:17px;display:grid;place-items:center;transition:transform .2s,background .2s;}
.iconbtn:hover{transform:translateY(-1px);}
.iconbtn.on{background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;border-color:transparent;}

/* HERO */
.wrap{position:relative;z-index:2;max-width:1040px;margin:0 auto;padding:clamp(28px,6vw,60px) clamp(16px,4vw,28px) 80px;}
.hero{text-align:center;margin-bottom:clamp(26px,5vw,46px);}
.kicker{display:inline-block;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--plum);
  background:rgba(124,58,237,.08);padding:6px 14px;border-radius:99px;margin-bottom:16px;font-weight:600;}
.hero h1{font-family:'Fraunces',serif;font-weight:700;line-height:1.02;font-size:clamp(40px,9vw,78px);letter-spacing:-1px;}
.hero h1 span{background:linear-gradient(100deg,var(--rose),var(--plum) 60%,var(--berry));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero p{margin:16px auto 0;max-width:540px;color:var(--muted);font-size:clamp(15px,2.4vw,18px);}

/* TABS */
.tabs{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 14px;margin-bottom:8px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:99px;cursor:pointer;
  border:1px solid var(--line);background:var(--glass);font-weight:600;font-size:14px;color:var(--ink);transition:all .25s;white-space:nowrap;}
.tab .e{font-size:17px;}
.tab.active{color:#fff;border-color:transparent;box-shadow:0 10px 24px rgba(124,58,237,.22);}
.tab.active.c0{background:linear-gradient(135deg,#ff7aa8,#ff5d8f);}
.tab.active.c1{background:linear-gradient(135deg,#a78bfa,#7c3aed);}
.tab.active.c2{background:linear-gradient(135deg,#818cf8,#4f46e5);}
.tab.active.c3{background:linear-gradient(135deg,#fb7185,#f43f6e);}
.tab.active.c4{background:linear-gradient(135deg,#fda4af,#fb7185);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:clamp(12px,2vw,18px);}
.card{position:relative;border-radius:22px;padding:20px 18px 18px;cursor:pointer;overflow:hidden;
  background:var(--glass);border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(8px);
  box-shadow:0 10px 30px rgba(124,58,237,.10);transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .28s;
  opacity:0;transform:translateY(14px) scale(.98);}
.card.in{opacity:1;transform:none;}
.card:hover{transform:translateY(-6px);box-shadow:0 22px 44px rgba(124,58,237,.20);}
.card .num{position:absolute;top:12px;right:14px;font-family:'Fraunces',serif;font-size:12px;color:var(--muted);opacity:.7;}
.card .ic{font-size:30px;display:block;margin-bottom:12px;filter:drop-shadow(0 6px 10px rgba(244,63,110,.22));}
.card h3{font-family:'Fraunces',serif;font-weight:600;font-size:17px;line-height:1.15;margin-bottom:5px;}
.card p{font-size:12.5px;color:var(--muted);line-height:1.4;}
.card .dot{position:absolute;left:18px;bottom:14px;width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .3s;}
.card.done .dot{opacity:1;box-shadow:0 0 0 4px rgba(255,93,143,.18);}
.card .sheen{position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.5),transparent 60%);transform:translateX(-120%);transition:transform .6s;}
.card:hover .sheen{transform:translateX(120%);}
.lock{filter:grayscale(.5);opacity:.85;}
.lock .ic{filter:none;}

/* WORLD OVERLAY */
.world{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;
  background:rgba(58,34,51,.32);backdrop-filter:blur(6px);}
.world.show{display:flex;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;}}
.panel{width:min(640px,100%);max-height:92vh;overflow:auto;border-radius:28px;position:relative;
  background:linear-gradient(180deg,#fff,#fff7fb);border:1px solid var(--line);
  box-shadow:0 40px 90px rgba(58,34,51,.35);animation:pop .35s cubic-bezier(.2,.9,.2,1);}
@keyframes pop{from{transform:translateY(24px) scale(.96);opacity:0;}}
.phead{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:12px;padding:18px 20px;
  background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.7));border-bottom:1px solid var(--line);backdrop-filter:blur(8px);}
.phead .pic{font-size:26px;}
.phead h2{font-family:'Fraunces',serif;font-weight:600;font-size:20px;flex:1;line-height:1.1;}
.close{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px;color:var(--muted);transition:transform .2s,color .2s;}
.close:hover{transform:rotate(90deg);color:var(--berry);}
.body{padding:24px 22px 30px;min-height:220px;}

/* shared UI bits */
.btn{font-family:inherit;font-weight:600;font-size:15px;border:none;cursor:pointer;border-radius:99px;padding:13px 24px;color:#fff;
  background:linear-gradient(135deg,var(--rose),var(--plum));box-shadow:0 12px 26px rgba(124,58,237,.28);transition:transform .15s,box-shadow .2s;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn.ghost{background:#fff;color:var(--plum);border:1px solid var(--line);box-shadow:none;}
.center{text-align:center;}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;}
.big{font-family:'Fraunces',serif;font-size:clamp(24px,6vw,34px);line-height:1.25;}
.msg{font-size:18px;line-height:1.6;}
.pill{display:inline-block;padding:9px 16px;border-radius:99px;background:rgba(124,58,237,.08);border:1px solid var(--line);
  margin:6px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s;}
.pill:hover{background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;border-color:transparent;}
.fld{width:100%;font-family:inherit;font-size:16px;padding:14px 16px;border-radius:16px;border:1px solid var(--line);background:#fff;outline:none;}
.fld:focus{border-color:var(--rose);box-shadow:0 0 0 4px rgba(255,93,143,.14);}
.cv{width:100%;border-radius:18px;display:block;background:#fff;border:1px solid var(--line);touch-action:none;}
.score{font-variant-numeric:tabular-nums;font-weight:700;}

/* toast + confetti */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;opacity:0;
  background:linear-gradient(135deg,var(--ink),#5b2f4a);color:#fff;padding:13px 22px;border-radius:99px;font-weight:600;
  box-shadow:0 16px 40px rgba(0,0,0,.3);transition:all .35s cubic-bezier(.2,.9,.2,1);pointer-events:none;font-size:14px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.conf{position:fixed;z-index:300;pointer-events:none;font-size:18px;will-change:transform;}

/* share */
.shareCard{text-align:center;}
.shareStat{display:flex;gap:14px;justify-content:center;margin:18px 0;}
.statBox{flex:1;max-width:150px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 10px;}
.statBox b{display:block;font-family:'Fraunces',serif;font-size:30px;background:linear-gradient(135deg,var(--rose),var(--plum));-webkit-background-clip:text;background-clip:text;color:transparent;}
.statBox span{font-size:12px;color:var(--muted);}
.track{height:12px;border-radius:99px;background:rgba(124,58,237,.12);overflow:hidden;margin:8px 0 4px;}
.track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--rose),var(--plum));transition:width 1s cubic-bezier(.2,.9,.2,1);}

@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important;}}
@media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}}
</style>
</head>
<body>
<div class="mesh"><i></i><i></i><i></i><i></i></div>
<div class="glow" id="glow"></div>

<div class="bar">
  <div class="brand">✦ Us</div>
  <div class="sp"></div>
  <div class="pts" id="ptsBtn" title="Your Love Points — tap to share">
    <span class="orb"></span><b id="ptsVal">0</b><small id="ptsSub">0/50 worlds</small>
  </div>
  <button class="iconbtn" id="musicBtn" title="Play our music">♪</button>
</div>

<div class="wrap">
  <header class="hero">
    <span class="kicker">made only for you</span>
    <h1>A Pocket<br>Universe of <span id="heroName">You</span></h1>
    <p>Fifty tiny worlds to open, one at a time. Each one is a little piece of how I feel. Collect Love Points as you explore — and unlock the last one. 💞</p>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main class="grid" id="grid"></main>
</div>

<div class="world" id="world"><div class="panel" id="panel"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ❤  EDIT EVERYTHING HERE — this is the only block you change
   ============================================================ */
const CFG = {
  herName: "My Love",                 // ← put her name here
  yourName: "Me",

  ],
  compliments: [

  ],

  ],
  fortunes: [

    "A small surprise will make you smile very soon.",
  ],
  truths: [
    "I think about you way more than I let on.",
    "You're the first thing on my mind when I wake up.",
    "I've replayed our best moments a hundred times.",
    "You make me nervous in the best possible way.",
    "I saved this whole little universe just to make you smile.",
  ],
  openWhen: {
    "you're sad": "Come here. Whatever it is, we'll face it together. You are never alone — I've got you. 🫂",
    "you miss me": "Close your eyes. I'm holding your hand right now. The distance is just a detail. 💕",
    "you can't sleep": "Breathe slow. Picture us, somewhere quiet and warm. I'll meet you in your dreams. 🌙",
    "you need a smile": "You're the cutest person I know and I'm grinning just thinking about you. 😊",
    "you're happy": "Save some of that joy for me — I want to celebrate every good thing with you. 🎉",
  },
  letter: "Dear you,\n\nI'm not always good with words out loud, so I built this instead. Every world in here is a small way of saying the same thing: I'm so grateful you're mine.\n\nYou make the loud parts of life quiet and the quiet parts of life feel like home. I notice everything about you — the big things and the tiny ones — and I fall for all of it.\n\nThank you for being you. I can't wait for everything we haven't done yet.\n\nAlways yours. ❤",
  whySpecial: "You're special because no one else is you. The way you think, the way you care, the way you light up a room without trying — that's one of a kind. And somehow I got lucky enough to be the one standing next to you.",

  coupons: [
    "🍿 One movie night — your pick, no complaints",
    "🍳 Breakfast made entirely by me",
    "🤗 A 20-minute no-phone cuddle",
    "💆 One free back/shoulder massage",
    "🎟 One 'yes' to anything you want to do",
    "🌃 A surprise date, planned start to finish by me",
  ],
  dreams: [
    "Watching the sunrise together somewhere new ☀",
    "A tiny home full of plants and laughter 🪴",
    "Dancing in the kitchen at midnight 💃",
    "Travelling the world, one city at a time ✈",
    "Growing old and still holding hands 👵👴",
  ],
  songTitle: "Our Song",
  songLyrics: [
    "In a world of seven billion,",
    "somehow I found you —",
    "and nothing's felt the same since.",
    "",
    "So here's to all our someday's,",
    "and every now in between.",
    "You're my favourite melody,",
    "the best thing I've ever seen. ♪",
  ],
  quiz: [
    { q:"Where did we first really talk?", a:"You know it by heart 💕" },
    { q:"What's my favourite thing about you?", a:"Everything. Genuinely." },
    { q:"Who falls asleep first?", a:"Definitely you 😴" },
    { q:"How long will I like you?", a:"Forever, and then a bit longer." },
  ],

  riddle: { q:"I speak without a mouth and hear without ears. I belong to you, and grow louder when you're near. What am I?", hint:"It beats…", a:"my heart" },
  secretPassword: "love",
  secretText: "You found it 💖 Here's the secret: from the very first day, I was already yours. I just didn't have the words yet.",

  countdownTo: "2026-12-25T00:00:00",   // ← a date you're counting toward
  countdownLabel: "until our next day together",
  distanceKm: 0,                         // ← km between you (0 if together)

  finaleMsg: "You made it through all fifty. 💫\n\nEvery little world was leading here, to one simple question I've wanted to ask:\n\nWill you keep being mine? ❤",

/* ============================================================
   ⚙  ENGINE — you don't need to edit below this line
   ============================================================ */
const $=(s,r=document)=>r.querySelector(s);
function h(tag,props,...kids){const e=document.createElement(tag);
  if(props)for(const k in props){const v=props[k];
    if(k==='class')e.className=v;else if(k==='style')e.style.cssText=v;
    else if(k==='html')e.innerHTML=v;else if(k.slice(0,2)==='on'&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!=null)e.setAttribute(k,v);}
  for(let k of kids){if(k==null||k===false)continue;e.append(k.nodeType?k:document.createTextNode(k));}return e;}
const rand=a=>a[Math.floor(Math.random()*a.length)];
const CATS=[
  {name:"Words & Feelings",e:"💌"},
  {name:"Games & Play",e:"🎮"},
  {name:"Magic & Dreams",e:"🌌"},
  {name:"Us & Forever",e:"💞"},
  {name:"Sweet & Silly",e:"🍓"},
];
const ACC=["#ff5d8f","#7c3aed","#4f46e5","#f43f6e","#fb7185"];

/* points */
let POINTS=0; const visited=new Set();
function award(n){POINTS+=n;const v=$('#ptsVal');v.textContent=POINTS;v.animate([{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:300});}
function refreshSub(){$('#ptsSub').textContent=visited.size+'/50 worlds';}

/* toast + confetti */
let tT;function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),1900);}
function burst(x=innerWidth/2,y=innerHeight/2,em=['💖','✨','💕','🌟','💗']){
  for(let i=0;i<26;i++){const s=h('span',{class:'conf'},rand(em));s.style.left=x+'px';s.style.top=y+'px';document.body.append(s);
    const ang=Math.random()*Math.PI*2,vel=4+Math.random()*7,dx=Math.cos(ang)*vel*14,dy=Math.sin(ang)*vel*14-60;
    s.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${dx}px,${dy+260}px) rotate(${Math.random()*720-360}deg)`,opacity:0}],{duration:1100+Math.random()*500,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>s.remove();}}

/* ---------- MUSIC (Web Audio, no files, works offline) ---------- */
let AC,musicOn=false,mi=0,mTimer;const BPM=74;
const NF={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,r:0};
const MELODY=[['E4',1],['G4',1],['C5',2],['B4',1],['A4',1],['G4',2],['A4',1],['B4',1],['C5',1],['E5',1],['D5',2],['r',1],
              ['C5',1],['A4',1],['G4',2],['F4',1],['E4',1],['G4',2],['A4',1],['G4',1],['E4',2],['r',2]];
function tone(f,d,g=0.11,ty='sine'){if(!f)return;const o=AC.createOscillator(),ga=AC.createGain();o.type=ty;o.frequency.value=f;
  ga.gain.setValueAtTime(0,AC.currentTime);ga.gain.linearRampToValueAtTime(g,AC.currentTime+.03);
  ga.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d*.92);o.connect(ga).connect(AC.destination);o.start();o.stop(AC.currentTime+d);}
function nextNote(){if(!musicOn)return;const [n,b]=MELODY[mi++%MELODY.length];const d=b*(60/BPM);
  tone(NF[n],d,.10,'sine');if(NF[n])tone(NF[n]/2,d,.05,'triangle');mTimer=setTimeout(nextNote,d*1000);}
function toggleMusic(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  musicOn=!musicOn;$('#musicBtn').classList.toggle('on',musicOn);$('#musicBtn').textContent=musicOn?'♫':'♪';
  if(musicOn){if(AC.state==='suspended')AC.resume();nextNote();toast('🎵 our song is playing');}else{clearTimeout(mTimer);}}
$('#musicBtn').onclick=toggleMusic;

/* cursor glow */
addEventListener('pointermove',e=>{const g=$('#glow');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';g.style.opacity=.8;});

/* ============================================================
   PROJECTS  (50)  — type or custom build()
   ============================================================ */
const P=[
/* ---- CAT 0 · Words & Feelings ---- */
{c:0,ic:"💌",t:"Reasons I Like You",b:"A new reason, every tap",type:"pick",data:()=>CFG.reasons,label:"another reason"},

/* ---------------- generic builders ---------------- */
function bPick(root,p){let last='';const out=h('div',{class:'center'});
  const m=h('div',{class:'big',style:'min-height:120px;display:flex;align-items:center;justify-content:center;padding:6px'});
  const show=()=>{let arr=p.data(),v;do{v=rand(arr);}while(arr.length>1&&v===last);last=v;
    m.style.opacity=0;setTimeout(()=>{m.textContent='“'+v+'”';m.style.transition='opacity .35s';m.style.opacity=1;},120);award(2);};
  show();out.append(m,h('br'),h('button',{class:'btn',onclick:show},p.label||'again'));root.append(out);}

function bType(root,p){const txt=p.data();const el=h('div',{class:'msg',style:'white-space:pre-wrap;font-family:Fraunces,serif;font-size:18px;line-height:1.7'});

function bCatch(root){const w=h('div',{class:'center'});const info=h('p',{style:'color:var(--muted)'},'Tap the hearts! 15 seconds.');
  const stage=h('div',{style:'position:relative;height:300px;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#fff,#fff2f7);border:1px solid var(--line);margin-top:10px'});
  const sc=h('div',{class:'score',style:'font-size:22px;margin-top:8px'},'Score: 0');let score=0,t=15,go=false,iv,tk;
  const start=h('button',{class:'btn',style:'margin-top:12px'},'Start');
  start.onclick=()=>{score=0;t=15;go=true;sc.textContent='Score: 0';start.disabled=true;start.textContent='Catching…';
    iv=setInterval(spawn,520);tk=setInterval(()=>{t--;info.textContent='⏱ '+t+'s left';if(t<=0)end();},1000);};
  function spawn(){if(!go)return;const em=Math.random()<0.18?'💔':'💖';const s=h('div',{style:`position:absolute;font-size:30px;cursor:pointer;left:${Math.random()*86}%;top:-40px;transition:transform .15s`},em);
    s.onclick=()=>{if(em==='💔'){score=Math.max(0,score-2);}else{score++;}sc.textContent='Score: '+score;s.remove();};
    stage.append(s);s.animate([{transform:'translateY(0)'},{transform:'translateY(340px)'}],{duration:2600,easing:'linear'}).onfinish=()=>s.remove();}
  function end(){go=false;clearInterval(iv);clearInterval(tk);stage.innerHTML='';start.disabled=false;start.textContent='Play again';
    info.innerHTML='';stage.append(h('div',{style:'position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:20px'},

function bMemory(root){const base=['💖','🌹','⭐','🌙','🍓','🦋'];let deck=base.concat(base).sort(()=>Math.random()-0.5);
  const w=h('div',{class:'center'});const info=h('p',{style:'color:var(--muted)'},'Match all the pairs 💕');
  const grid=h('div',{style:'display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:300px;margin:14px auto'});
  let open=[],lock=false,found=0;
  deck.forEach((em,idx)=>{const c=h('div',{style:'aspect-ratio:1;border-radius:14px;display:grid;place-items:center;font-size:26px;cursor:pointer;background:linear-gradient(135deg,var(--rose),var(--plum));color:transparent;user-select:none;transition:transform .2s'},em);
    c.dataset.em=em;c.onclick=()=>{if(lock||c.style.color==='var(--ink)'||open.includes(c))return;c.style.color='var(--ink)';c.style.background='#fff';c.style.border='1px solid var(--line)';open.push(c);
      if(open.length===2){lock=true;setTimeout(()=>{if(open[0].dataset.em===open[1].dataset.em){found++;open=[];lock=false;if(found===base.length){info.innerHTML='';w.append(h('div',{class:'big',style:'margin-top:8px'},'You matched them all! 🎉'));burst();award(8);}}
        else{open.forEach(x=>{x.style.color='transparent';x.style.background='linear-gradient(135deg,var(--rose),var(--plum))';x.style.border='none';});open=[];lock=false;}},700);}award(1);};

function bTTT(root){const w=h('div',{class:'center'});const info=h('p',{style:'color:var(--muted)'},'You\'re ❤. Go ahead — try to lose 😉');
  let bd=Array(9).fill('');const grid=h('div',{style:'display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:260px;margin:14px auto'});const cells=[];
  const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const winner=b=>{for(const[a,c,d]of wins)if(b[a]&&b[a]===b[c]&&b[c]===b[d])return b[a];return b.includes('')?null:'tie';};
  function draw(){cells.forEach((c,i)=>{c.textContent=bd[i];c.style.color=bd[i]==='❤'?'var(--rose)':'var(--plum)';});}
  function aiMove(){ // intentionally weak: avoid completing its own line, never block player
    const empty=bd.map((v,i)=>v?null:i).filter(v=>v!==null);
    // pick a move that does NOT make 3-in-a-row for AI
    const safe=empty.filter(i=>{const t=[...bd];t[i]='🤍';return winner(t)!=='🤍';});
    const pick=rand(safe.length?safe:empty);bd[pick]='🤍';}
  function check(){const r=winner(bd);if(r){info.innerHTML='';draw();
    const msg=r==='❤'?'You win! 🎉 (obviously)':r==='tie'?'A tie — we\'re a perfect match 💞':'…I let that happen 😅';
    w.append(h('div',{class:'big',style:'margin-top:6px'},msg));if(r!=='🤍')burst();award(6);grid.style.pointerEvents='none';return true;}return false;}
  for(let i=0;i<9;i++){const c=h('div',{style:'aspect-ratio:1;border-radius:14px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:34px;cursor:pointer'});
    c.onclick=()=>{if(bd[i])return;bd[i]='❤';draw();if(check())return;setTimeout(()=>{aiMove();draw();check();},350);};cells.push(c);grid.append(c);}
  w.append(info,grid);root.append(w);}

function bWheel(root){const ideas=["Movie night 🍿","Cook together 🍳","Stargazing 🌟","Long walk 🚶","Picnic 🧺","Dance party 💃","Game night 🎮","Coffee date ☕","Road trip 🚗","Breakfast in bed 🥞"];
  const w=h('div',{class:'center'});const cv=h('canvas',{class:'cv',width:300,height:300,style:'max-width:300px;margin:auto'});const ctx=cv.getContext('2d');
  const out=h('div',{class:'big',style:'margin-top:14px;min-height:50px'});let ang=0,spinning=false;
  function draw(){const n=ideas.length,r=150;ctx.clearRect(0,0,300,300);ctx.save();ctx.translate(150,150);ctx.rotate(ang);
    for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,i*2*Math.PI/n,(i+1)*2*Math.PI/n);
      ctx.fillStyle=i%2?'#ffd9e6':'#e6d9ff';ctx.fill();ctx.save();ctx.rotate((i+0.5)*2*Math.PI/n);ctx.textAlign='right';ctx.fillStyle='#5b2f4a';ctx.font='11px Outfit';ctx.fillText(ideas[i],r-12,4);ctx.restore();}
    ctx.restore();ctx.fillStyle='#f43f6e';ctx.beginPath();ctx.moveTo(290,150);ctx.lineTo(266,140);ctx.lineTo(266,160);ctx.fill();}
  draw();const spin=h('button',{class:'btn',style:'margin-top:12px'},'Spin');
  spin.onclick=()=>{if(spinning)return;spinning=true;out.textContent='';const target=ang+Math.PI*8+Math.random()*Math.PI*2;const start=ang,t0=performance.now(),dur=3200;
    (function an(t){const k=Math.min(1,(t-t0)/dur);ang=start+(target-start)*(1-Math.pow(1-k,3));draw();if(k<1)requestAnimationFrame(an);
      else{spinning=false;const norm=(2*Math.PI-(ang%(2*Math.PI)))%(2*Math.PI);const idx=Math.floor(norm/(2*Math.PI/ideas.length))%ideas.length;out.textContent='Let\'s do: '+ideas[idx];burst();award(5);}})(t0);};
  w.append(h('p',{style:'color:var(--muted);margin-bottom:10px'},'Spin for our next date idea'),cv,h('br'),spin,out);root.append(w);}

function bSlots(root){const sym=['💖','🌹','⭐','🍓','🦋'];const w=h('div',{class:'center'});

  lips.onclick=()=>{n++;count.textContent=n+' 💋';lips.animate([{transform:'scale(1.3)'},{transform:'scale(1)'}],{duration:200});
    const fly=h('span',{class:'conf'},'💋');fly.style.left=(innerWidth/2)+'px';fly.style.top=(innerHeight/2)+'px';document.body.append(fly);
    fly.animate([{transform:'translateY(0)',opacity:1},{transform:'translateY(-120px)',opacity:0}],{duration:800}).onfinish=()=>fly.remove();
    if(ms[n]){note.textContent=ms[n];award(3);}else award(1);};
  w.append(h('p',{style:'color:var(--muted)'},'Tap to collect kisses 😘'),count,lips,note);root.append(w);}

function bBouquet(root){const flowers=['🌷','🌹','🌸','🌻','🌼','💐'];const w=h('div',{class:'center'});
  const garden=h('div',{style:'min-height:130px;font-size:36px;line-height:1.4;margin:14px 0'});const btn=h('button',{class:'btn'},'🌱 Grow a flower');const note=h('p',{class:'msg'});let n=0;
  btn.onclick=()=>{n++;const f=h('span',{style:'display:inline-block;opacity:0;transform:scale(0)'},rand(flowers));garden.append(f);
    f.animate([{opacity:0,transform:'scale(0) translateY(10px)'},{opacity:1,transform:'scale(1) translateY(0)'}],{duration:500,fill:'forwards'});award(1);
    if(n===6){note.textContent='A whole bouquet — picked one flower at a time, just like I\'d pick you every day. 💐';burst();award(4);}};
  w.append(h('p',{style:'color:var(--muted)'},'Tap to grow you a bouquet'),garden,btn,note);root.append(w);}

function bDice(root){const acts=["share a long hug 🤗","tell each other a secret 🤫","plan a tiny adventure 🗺","send a sweet text 💌","watch the sky together 🌌","dance to one song 💃"];
  const w=h('div',{class:'center'});const die=h('div',{style:'font-size:70px;margin:10px'},'🎲');const out=h('div',{class:'big',style:'min-height:60px'});let busy=false;
  const btn=h('button',{class:'btn'},'Roll');btn.onclick=()=>{if(busy)return;busy=true;out.textContent='';let c=0;const iv=setInterval(()=>{die.textContent=rand(['⚀','⚁','⚂','⚃','⚄','⚅']);if(++c>10){clearInterval(iv);busy=false;out.textContent='Let\'s '+rand(acts);burst();award(4);}},90);};
  w.append(h('p',{style:'color:var(--muted)'},'Roll to see what we should do together'),die,btn,out);root.append(w);}

function bRate(root){const w=h('div',{class:'center'});const out=h('div',{class:'msg',style:'min-height:60px;margin-top:14px'});const stars=h('div',{style:'font-size:34px'});
  for(let i=1;i<=5;i++){const s=h('span',{style:'cursor:pointer;opacity:.4;transition:opacity .2s'},'⭐');
    s.onclick=()=>{[...stars.children].forEach((x,j)=>x.style.opacity=j<i?1:.4);
      const r={1:"A rough one? I\'m here. Tomorrow gets a fresh start, and you don\'t face it alone. 💛",2:"Not the best day — let me help carry it. Tell me everything. 🫂",3:"A middling day. Let\'s end it on a good note: you\'re appreciated. 💕",4:"A good day! I love hearing that. You deserve all of it. 🌟",5:"A perfect day?! That makes two of us happy. So proud of you. 💞"}[i];
      out.style.opacity=0;setTimeout(()=>{out.textContent=r;out.style.transition='opacity .3s';out.style.opacity=1;},120);award(3);};stars.append(s);}
  w.append(h('p',{style:'color:var(--muted)'},'How was your day? Tap the stars.'),stars,out);root.append(w);}

function bSweeter(root){const pairs=[["Honey 🍯","You 💛"],["Chocolate 🍫","You 💛"],["Sunsets 🌅","You 💛"],["Candy 🍬","You 💛"]];let i=0;const w=h('div',{class:'center'});
  const q=h('div',{class:'big',style:'margin-bottom:14px'});const row=h('div',{class:'row'});const out=h('div',{class:'msg',style:'min-height:40px;margin-top:12px'});
  function render(){q.textContent='Which is sweeter?';row.innerHTML='';pairs[i].forEach((opt,j)=>{const b=h('button',{class:'btn'+(j===0?' ghost':''),style:'margin:6px'},opt);
    b.onclick=()=>{out.textContent=j===1?'Correct — it\'s always you. 💞':'Aww, but the real answer is always you. 💕';setTimeout(()=>{i=(i+1)%pairs.length;render();out.textContent='';},1400);award(2);};row.append(b);});}
  render();w.append(q,row,out);root.append(w);}

function bComfort(root){const w=h('div',{class:'center'});const circle=h('div',{style:'width:120px;height:120px;border-radius:50%;margin:16px auto;background:radial-gradient(circle,var(--rose),var(--plum));display:grid;place-items:center;color:#fff;font-weight:600'},'breathe');
  const txt=h('p',{class:'msg',style:'margin-top:10px'},'Press start, and let\'s breathe together for a moment.');const btn=h('button',{class:'btn'},'Start breathing');let on=false,iv;
  btn.onclick=()=>{on=!on;btn.textContent=on?'Stop':'Start breathing';if(on){let phase=0;const cyc=()=>{const p=['Breathe in…','Hold…','Breathe out…','Hold…'][phase%4];circle.textContent=p;
    circle.animate(phase%4===0?[{transform:'scale(1)'},{transform:'scale(1.4)'}]:phase%4===2?[{transform:'scale(1.4)'},{transform:'scale(1)'}]:[{transform:'scale(1)'}],{duration:4000,fill:'forwards'});phase++;};cyc();iv=setInterval(cyc,4000);txt.textContent='You\'re safe. I\'ve got you. 🫂';award(4);}else clearInterval(iv);};
  root._cleanup=()=>clearInterval(iv);w.append(txt,circle,btn);root.append(w);}

function bFinale(root){const need=49,have=visited.size; // visited counts opened worlds excluding this
  const w=h('div',{class:'center'});
  if(have<need){const left=need-have;
    w.append(h('div',{style:'font-size:60px'},'🔒'),h('div',{class:'big',style:'margin:14px 0'},'Almost there…'),
      h('p',{class:'msg'},'Explore '+left+' more world'+(left>1?'s':'')+' to unlock the finale.'),
      h('div',{class:'track',style:'max-width:320px;margin:18px auto'},h('i',{style:'width:'+Math.round(have/need*100)+'%'})),
      h('p',{style:'color:var(--muted)'},have+' / '+need+' explored'));
    root.append(w);return;}
  const el=h('div',{class:'msg',style:'white-space:pre-wrap;font-family:Fraunces,serif;font-size:20px;line-height:1.7;text-align:center'});w.append(el);
  let i=0,txt=CFG.finaleMsg;(function tk(){if(i<=txt.length){el.textContent=txt.slice(0,i++);setTimeout(tk,txt[i-1]==='\n'?180:38);}else finish();})();
  function finish(){const yes=h('button',{class:'btn',style:'margin-top:22px;font-size:18px;padding:15px 34px'},'Yes 💞');
    yes.onclick=()=>{w.append(h('div',{class:'big',style:'margin-top:18px'},'You + Me. Always. �f0'.replace('�f0','🌍✨')));for(let k=0;k<5;k++)setTimeout(()=>burst(Math.random()*innerWidth,Math.random()*innerHeight),k*250);award(20);};
    w.append(yes);burst();}
  root.append(w);award(15);}

/* ============================================================
   RENDER HUB
   ============================================================ */
P.forEach((p,i)=>p._n=i+1);
let activeCat=0;
const tabsEl=$('#tabs'),gridEl=$('#grid');
CATS.forEach((c,ci)=>{const t=h('div',{class:'tab c'+ci+(ci===0?' active':''),onclick:()=>setCat(ci)},h('span',{class:'e'},c.e),c.name);t.dataset.ci=ci;tabsEl.append(t);});
function setCat(ci){activeCat=ci;[...tabsEl.children].forEach((t,i)=>t.classList.toggle('active',i===ci));renderGrid();}
function renderGrid(){gridEl.innerHTML='';document.documentElement.style.setProperty('--accent',ACC[activeCat]);
  P.filter(p=>p.c===activeCat).forEach((p,idx)=>{const locked=p.locked&&visited.size<49;
    const card=h('div',{class:'card'+(locked?' lock':'')+(visited.has(p._n)?' done':''),onclick:()=>openWorld(p)},
      h('span',{class:'num'},'#'+String(p._n).padStart(2,'0')),h('span',{class:'sheen'}),
      h('span',{class:'ic'},locked?'🔒':p.ic),h('h3',{},p.t),h('p',{},locked?'Unlocks at 49/49 worlds':p.b),h('span',{class:'dot'}));
    gridEl.append(card);requestAnimationFrame(()=>setTimeout(()=>card.classList.add('in'),idx*45));});}
setCat(0);

/* ============================================================
   OPEN WORLD
   ============================================================ */
const worldEl=$('#world'),panelEl=$('#panel');let curCleanup=null;
function openWorld(p){
  if(curCleanup){curCleanup();curCleanup=null;}
  panelEl.innerHTML='';
  panelEl.append(h('div',{class:'phead'},h('span',{class:'pic'},p.ic),h('h2',{},p.t),h('button',{class:'close',onclick:closeWorld},'✕')));
  const body=h('div',{class:'body'});panelEl.append(body);
  document.documentElement.style.setProperty('--accent',ACC[p.c]);
  worldEl.classList.add('show');panelEl.scrollTop=0;
  // award on first visit (finale handled inside)
  const firstTime=!visited.has(p._n);
  try{ if(p.build)p.build(body,p); else ({pick:bPick,type:bType,daily:bDaily,moods:bMoods,secret:bSecret,slides:bSlides,quiz:bQuiz})[p.type](body,p); }
  catch(err){body.append(h('p',{},'Oops, something glitched in this world. 💔'));console.error(err);}
  if(body._cleanup)curCleanup=body._cleanup;
  if(firstTime && !(p.locked&&visited.size<49)){visited.add(p._n);refreshSub();award(10);toast('✨ +10 — world '+visited.size+'/50 unlocked');renderGrid();maybeFinaleHint();}
}
function closeWorld(){worldEl.classList.remove('show');if(curCleanup){curCleanup();curCleanup=null;}}
worldEl.addEventListener('click',e=>{if(e.target===worldEl)closeWorld();});
addEventListener('keydown',e=>{if(e.key==='Escape')closeWorld();});
function maybeFinaleHint(){if(visited.size===49)toast('🔓 The Grand Finale is unlocked!');}

/* ============================================================
   SHARE LOVE POINTS
   ============================================================ */
$('#ptsBtn').onclick=openShare;
function openShare(){
  if(curCleanup){curCleanup();curCleanup=null;}
  panelEl.innerHTML='';
  panelEl.append(h('div',{class:'phead'},h('span',{class:'pic'},'💞'),h('h2',{},'Your Love Points'),h('button',{class:'close',onclick:closeWorld},'✕')));
  const pct=Math.round(visited.size/P.length*100);
  const body=h('div',{class:'body shareCard'});
  body.append(
    h('p',{style:'color:var(--muted)'},'Here\'s how far you\'ve explored our little universe:'),
    h('div',{class:'shareStat'},
      h('div',{class:'statBox'},h('b',{},String(POINTS)),h('span',{},'Love Points')),
      h('div',{class:'statBox'},h('b',{},visited.size+'/50'),h('span',{},'worlds'))),
    h('div',{class:'track'},h('i',{style:'width:'+pct+'%'})),
    h('p',{style:'color:var(--muted);font-size:13px'},pct+'% explored'),
    h('p',{class:'msg',style:'margin:14px 0'},pct>=100?'You opened every single one. You have my whole heart. 💞':pct>=50?'More than halfway through — keep going, the best is near. 💕':'Just getting started. Fifty little ways to say I adore you. 💗')
  );
  const shareText=`💞 ${CFG.herName} has unlocked ${visited.size}/50 worlds and earned ${POINTS} Love Points in our Pocket Universe! (${pct}%) Made with love. 💕`;
  const btns=h('div',{class:'row',style:'margin-top:6px'});
  btns.append(h('button',{class:'btn',onclick:async()=>{
    if(navigator.share){try{await navigator.share({title:'Our Love Points',text:shareText});award(2);return;}catch(e){}}
    try{await navigator.clipboard.writeText(shareText);toast('💌 copied — paste it anywhere!');}catch(e){toast('copy not supported here');}
  }},'📤 Share'));
  btns.append(h('button',{class:'btn ghost',onclick:()=>downloadCard(pct)},'🖼 Save image'));
  body.append(btns);panelEl.append(body);worldEl.classList.add('show');panelEl.scrollTop=0;
}
function downloadCard(pct){const c=document.createElement('canvas');c.width=1080;c.height=1080;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,1080,1080);g.addColorStop(0,'#ff8fb3');g.addColorStop(.5,'#b39ddb');g.addColorStop(1,'#ffc599');x.fillStyle=g;x.fillRect(0,0,1080,1080);
  x.fillStyle='rgba(255,255,255,.16)';for(let i=0;i<60;i++){x.beginPath();x.arc(Math.random()*1080,Math.random()*1080,Math.random()*4,0,7);x.fill();}
  x.textAlign='center';x.fillStyle='#fff';x.font='600 44px Outfit, sans-serif';x.fillText('✦ A POCKET UNIVERSE OF US ✦',540,180);
  x.font='700 150px Georgia, serif';x.fillText('💞',540,360);
  x.font='700 96px Outfit, sans-serif';x.fillText(POINTS+' Love Points',540,560);
  x.font='500 56px Outfit, sans-serif';x.fillText(visited.size+' / 50 worlds explored',540,650);
  x.fillStyle='rgba(255,255,255,.35)';x.fillRect(240,720,600,28);x.fillStyle='#fff';x.fillRect(240,720,600*pct/100,28);
  x.font='500 44px Outfit, sans-serif';x.fillText(pct+'% complete',540,820);
  x.font='italic 40px Georgia, serif';x.fillText('for '+CFG.herName+' — with all my heart',540,940);
  const a=document.createElement('a');a.download='our-love-points.png';a.href=c.toDataURL('image/png');a.click();toast('🖼 image saved!');award(2);}

/* personalize hero */
$('#heroName').textContent=CFG.herName;
document.title='For '+CFG.herName+' ✦ A Pocket Universe of Us';

/* gentle welcome */
setTimeout(()=>toast('💕 tap any card to open a world'),700);
</script>
</body>
